name: Build

on:
  push:
    tags:
      - current
      - testing

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: eso-addons-manager-windows-amd64.zip
          - os: ubuntu-latest
            asset: eso-addons-manager-linux-amd64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: pyinstaller app.spec
      - name: Package + checksum
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, shutil
          asset = "${{ matrix.asset }}"
          shutil.make_archive(asset[:-4], 'zip', 'dist/app')
          data = open(asset, 'rb').read()
          open(asset + '.sha256', 'w').write(hashlib.sha256(data).hexdigest())
          PY
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ github.ref_name == 'testing' }}
          make_latest: ${{ github.ref_name == 'current' }}
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
