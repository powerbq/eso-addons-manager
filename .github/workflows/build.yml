name: Build

on:
  push:
    tags:
      - current
      - testing

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: eso-addons-manager-windows-amd64.zip
          - os: ubuntu-latest
            asset: eso-addons-manager-linux-amd64.zip
          - os: macos-14
            asset: eso-addons-manager-macos-arm64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Compile translations
        shell: bash
        run: ./compile_translations.sh
      - run: pyinstaller app.spec
      - name: Package + checksum
        shell: bash
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            ditto -c -k --keepParent dist/app.app "$ASSET"
          else
            python -c "import shutil, os; shutil.make_archive(os.environ['ASSET'][:-4], 'zip', 'dist/app')"
          fi
          python -c "import hashlib, os; a = os.environ['ASSET']; open(a + '.sha256', 'w').write(hashlib.sha256(open(a, 'rb').read()).hexdigest())"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ github.ref_name == 'testing' }}
          make_latest: ${{ github.ref_name == 'current' }}
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
